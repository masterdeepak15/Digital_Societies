name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION:   '20.x'

jobs:
  # ── Backend: Build + Test ───────────────────────────────────────────────────
  backend:
    name: .NET Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       digital_societies_test
          POSTGRES_USER:     ds_test
          POSTGRES_PASSWORD: testpassword
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/DigitalSocieties.sln') }}

      - name: Restore
        run: dotnet restore DigitalSocieties.sln

      - name: Build
        run: dotnet build DigitalSocieties.sln --no-restore -c Release

      - name: Test
        run: dotnet test DigitalSocieties.sln --no-build -c Release \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=digital_societies_test;Username=ds_test;Password=testpassword"
          Jwt__SecretKey: "ci-test-secret-key-minimum-32-chars-here"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: '**/test-results.trx'

      - name: SAST — Vulnerability scan
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true

  # ── Mobile: Lint + Type-check ───────────────────────────────────────────────
  mobile:
    name: React Native Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --watchAll=false --passWithNoTests

  # ── Docker: Build image ─────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context:    services
          file:       services/DigitalSocieties.Api/Dockerfile
          push:       true
          tags:       ghcr.io/${{ github.repository_owner }}/digital-societies-api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
