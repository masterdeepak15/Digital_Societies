global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'digital-societies'

rule_files: []

scrape_configs:
  # Pull metrics that the .NET API exposes directly at /metrics
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Pull from the OTEL collector's Prometheus exporter
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 15s

  # Postgres Exporter (optional — add postgres_exporter service to use this)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
